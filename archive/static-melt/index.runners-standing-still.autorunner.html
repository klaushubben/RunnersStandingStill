<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TextureMelt Auto Runner</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const WAIT_MS = Number(params.get("wait") || 10000);

        function randomHash() {
            const bytes = new Uint8Array(32);
            crypto.getRandomValues(bytes);

            return "0x" + Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
        }

        function currentHash() {
            const hash = params.get("hash");

            return /^0x[0-9a-fA-F]{64}$/.test(hash || "") ? hash : randomHash();
        }

        window.tokenData = {
            tokenId: params.get("tokenId") || Date.now().toString(),
            hash: currentHash(),
            externalAssetDependencies: [],
            preferredIPFSGateway: "https://ipfs.artblocks.io/ipfs/",
            preferredArweaveGateway: "https://arweave.net/",
        };
    </script>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #f5f5f2;
        }

        body {
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
        }

        .status {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 2;
            max-width: min(70vw, 720px);
            padding: 8px 10px;
            background: rgba(245, 245, 242, 0.86);
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #111111;
            font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="status" id="status">rendering</div>
    <canvas></canvas>
    <script>
        const status = document.getElementById("status");

        function downloadText(filename, text) {
            const blob = new Blob([text], { type: "application/json" });
            const a = document.createElement("a");

            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(a.href);
        }

        function downloadCanvas(filename, canvas) {
            const a = document.createElement("a");

            a.href = canvas.toDataURL("image/png");
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        function nextRun() {
            const next = new URL(window.location.href);

            next.searchParams.set("hash", randomHash());
            next.searchParams.set("tokenId", Date.now().toString());
            window.location.href = next.toString();
        }

        window.addEventListener("texturemelt:complete", (event) => {
            const canvas = document.querySelector("canvas");
            const hash = event.detail.tokenData.hash;
            const base = hash;
            const payload = {
                savedAt: new Date().toISOString(),
                tokenData: event.detail.tokenData,
                features: event.detail.features,
                settings: event.detail.settings,
                renderMs: event.detail.renderMs,
            };

            status.textContent = `saving ${hash}`;
            downloadCanvas(`${base}.png`, canvas);
            downloadText(`${base}.json`, JSON.stringify(payload, null, 2));

            status.textContent = `saved ${hash}; next in ${Math.round(WAIT_MS / 1000)}s`;
            setTimeout(nextRun, WAIT_MS);
        });

        status.textContent = `rendering ${window.tokenData.hash}`;
    </script>
    <script src="./sketch.runners-standing-still.js"></script>
</body>
</html>
